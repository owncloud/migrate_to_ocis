name: Acceptance

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: acceptance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    name: End-to-end migration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: Run acceptance suite
        run: make test-acceptance

      - name: Upload acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-artifacts
          path: tests/acceptance/artifacts/
          if-no-files-found: warn
