name: Acceptance

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: acceptance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    name: End-to-end migration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The assert modules pipe curl output through jq on the runner host.
      # ubuntu-latest ships jq today, but install explicitly so the suite does
      # not silently depend on the runner image.
      - name: Install jq
        run: |
          if ! command -v jq >/dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          jq --version

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '7.4'
          tools: composer

      - name: Run acceptance suite
        run: make test-acceptance

      - name: Upload acceptance artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: acceptance-artifacts
          path: tests/acceptance/artifacts/
          if-no-files-found: warn
